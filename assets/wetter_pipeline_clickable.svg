<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">WETTER Framework Ecosystem</title>
  <desc id="desc">Clickable WETTER framework pipeline with placeholder icon slots for DAMPF, KEIM, WOLKE and BLITZ.</desc>

  <style>
    .bg { fill: #0d0f12; }
    .grid { stroke: #1b1f25; stroke-width: 1; opacity: 0.55; }
    .title { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; }
    .subtitle { fill: #b7bec9; font-family: Arial, Helvetica, sans-serif; font-size: 18px; }
    .ocean { fill: #10151b; stroke: #2d3742; stroke-width: 2; }
    .ocean-text { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; text-anchor: middle; }
    .ocean-sub { fill: #9aa5b1; font-family: Arial, Helvetica, sans-serif; font-size: 14px; text-anchor: middle; }
    .card { fill: #12161c; stroke: #2a313a; stroke-width: 2; }
    .card:hover { stroke: #68c2ff; stroke-width: 3; }
    .slot { fill: #000000; stroke: #303844; stroke-width: 1.5; }
    .mod { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; text-anchor: middle; }
    .acro { fill: #a6b1bd; font-family: Arial, Helvetica, sans-serif; font-size: 11px; text-anchor: middle; }
    .desc-txt { fill: #c5ccd4; font-family: Arial, Helvetica, sans-serif; font-size: 11px; text-anchor: middle; }
    .placeholder { fill: #697586; font-family: Arial, Helvetica, sans-serif; font-size: 12px; text-anchor: middle; }
    .arrow { stroke: #7d8a97; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    .feedback { stroke: #4e5a67; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead2); stroke-dasharray: 8 7; }
    .feedback-label { fill: #8995a3; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
    .clickhint { fill: #6fc8ff; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7d8a97"/>
    </marker>
    <marker id="arrowhead2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#4e5a67"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="460"/>

  <!-- grid -->
  <g>
    <line class="grid" x1="0" y1="80" x2="1600" y2="80"/>
    <line class="grid" x1="0" y1="160" x2="1600" y2="160"/>
    <line class="grid" x1="0" y1="240" x2="1600" y2="240"/>
    <line class="grid" x1="0" y1="320" x2="1600" y2="320"/>
    <line class="grid" x1="0" y1="400" x2="1600" y2="400"/>

    <line class="grid" x1="100" y1="0" x2="100" y2="460"/>
    <line class="grid" x1="200" y1="0" x2="200" y2="460"/>
    <line class="grid" x1="300" y1="0" x2="300" y2="460"/>
    <line class="grid" x1="400" y1="0" x2="400" y2="460"/>
    <line class="grid" x1="500" y1="0" x2="500" y2="460"/>
    <line class="grid" x1="600" y1="0" x2="600" y2="460"/>
    <line class="grid" x1="700" y1="0" x2="700" y2="460"/>
    <line class="grid" x1="800" y1="0" x2="800" y2="460"/>
    <line class="grid" x1="900" y1="0" x2="900" y2="460"/>
    <line class="grid" x1="1000" y1="0" x2="1000" y2="460"/>
    <line class="grid" x1="1100" y1="0" x2="1100" y2="460"/>
    <line class="grid" x1="1200" y1="0" x2="1200" y2="460"/>
    <line class="grid" x1="1300" y1="0" x2="1300" y2="460"/>
    <line class="grid" x1="1400" y1="0" x2="1400" y2="460"/>
    <line class="grid" x1="1500" y1="0" x2="1500" y2="460"/>
  </g>

  <text class="title" x="120" y="56">WETTER Framework Ecosystem</text>
  <text class="subtitle" x="120" y="88">
    <tspan x="120" dy="0">Raw image and matrix data → indexing → analysis →</tspan>
    <tspan x="120" dy="22">web exploration → high-performance inspection</tspan>
  </text>

  <!-- raw data ocean -->
  <g>
    <rect class="ocean" x="145" y="170" width="210" height="145" rx="22"/>
    <text class="ocean-text" x="250" y="230">RAW DATA OCEAN</text>
    <text class="ocean-sub" x="250" y="258">images · matrices · folder structure</text>
    <text class="ocean-sub" x="250" y="280">experiments · measurements</text>
  </g>

  <!-- arrows -->
  <path class="arrow" d="M 355 242 L 420 242"/>
  <path class="arrow" d="M 630 242 L 695 242"/>
  <path class="arrow" d="M 905 242 L 970 242"/>
  <path class="arrow" d="M 1180 242 L 1245 242"/>

  <!-- feedback loop -->
  <!-- <path class="feedback" d="M 1395 320 C 1465 320, 1490 360, 1490 410 C 1490 470, 1220 505, 860 505 C 520 505, 360 470, 360 410 C 360 370, 390 344, 430 330"/>
  <text class="feedback-label" x="1250" y="355">iterative exploration / feedback loop</text> -->

  <!-- cards -->
  <a href="https://github.com/PiMaV/DAMPF" target="_blank">
    <g>
      <rect class="card" x="420" y="120" width="210" height="245" rx="22"/>
      <image
        href="icons/dampf_256.png"
        x="475"
        y="145"
        width="100"
        height="100"
      />
      <text class="mod" x="525" y="278">DAMPF</text>
      <text class="acro" x="525" y="298">
        <tspan x="525" dy="0">Data Aggregation &amp;</tspan>
        <tspan x="525" dy="14">Modular Processing Framework</tspan>
      </text>
      <text class="desc-txt" x="525" y="328">Filename-semantic indexing</text>
      <text class="desc-txt" x="525" y="343">WETTER SQLite database</text>

    </g>
  </a>

  <a href="https://github.com/PiMaV/KEIM" target="_blank">
    <g>
      <rect class="card" x="695" y="120" width="210" height="245" rx="22"/>
      <image
        href="icons/keim_256.png"
        x="750"
        y="145"
        width="100"
        height="100"
      />
      <text class="mod" x="800" y="278">KEIM</text>
      <text class="acro" x="800" y="298">
        <tspan x="800" dy="0">Knowledge Extraction &amp;</tspan>
        <tspan x="800" dy="14">Indexing Module</tspan>
      </text>
      <text class="desc-txt" x="800" y="328">Scalar statistics</text>
      <text class="desc-txt" x="800" y="343">Data enrichment / extraction</text>
    </g>
  </a>

  <a href="https://github.com/PiMaV/WOLKE" target="_blank">
    <g>
      <rect class="card" x="970" y="120" width="210" height="245" rx="22"/>
      <image
        href="icons/wolke_256.png"
        x="1025"
        y="145"
        width="100"
        height="100"
      />
      <text class="mod" x="1075" y="278">WOLKE</text>
      <text class="acro" x="1075" y="298">
        <tspan x="1075" dy="0">Web-Oriented Layout for</tspan>
        <tspan x="1075" dy="14">Knowledge Exploration</tspan>
      </text>
      <text class="desc-txt" x="1075" y="328">Interactive web exploration</text>
      <text class="desc-txt" x="1075" y="343">Direct HTTP integration with BLITZ</text>
    </g>
  </a>

  <a href="https://github.com/PiMaV/BLITZ" target="_blank">
    <g>
      <rect class="card" x="1245" y="120" width="210" height="245" rx="22"/>
      <image
        href="icons/blitz_256.png"
        x="1300"
        y="145"
        width="100"
        height="100"
      />
      <text class="mod" x="1350" y="278">BLITZ</text>
      <text class="acro" x="1350" y="298">
        <tspan x="1350" dy="0">Bulk Loading &amp; Interactive</tspan>
        <tspan x="1350" dy="14">Time-series Zonal Analysis</tspan>
      </text>
      <text class="desc-txt" x="1350" y="328">Rapid image inspection</text>
      <text class="desc-txt" x="1350" y="343">Synchronized with WOLKE</text>
    </g>
  </a>

  <text class="clickhint" x="120" y="435">Each module card is clickable and can link directly to its GitHub repository from the README.</text>
</svg>
